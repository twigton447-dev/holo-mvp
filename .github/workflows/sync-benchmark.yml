name: Sync frontend to holo-benchmark

on:
  push:
    branches: [main]
    paths:
      - 'frontend/whitepaper.html'
      - 'frontend/benchmark.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout holo-mvp
        uses: actions/checkout@v4
        with:
          path: holo-mvp

      - name: Checkout holo-benchmark
        uses: actions/checkout@v4
        with:
          repository: twigton447-dev/holo-benchmark
          token: ${{ secrets.BENCHMARK_SYNC_TOKEN }}
          path: holo-benchmark

      - name: Copy files
        run: |
          cp holo-mvp/frontend/whitepaper.html holo-benchmark/frontend/whitepaper.html
          cp holo-mvp/frontend/benchmark.html holo-benchmark/frontend/benchmark.html

      - name: Commit and push
        working-directory: holo-benchmark
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/whitepaper.html frontend/benchmark.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "sync: whitepaper.html from holo-mvp@${{ github.sha }}"
          git push
