name: Sync frontend to holo-benchmark

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout holo-mvp
        uses: actions/checkout@v4
        with:
          path: holo-mvp

      - name: Checkout holo-benchmark
        uses: actions/checkout@v4
        with:
          repository: twigton447-dev/holo-benchmark
          token: ${{ secrets.BENCHMARK_SYNC_TOKEN }}
          path: holo-benchmark

      - name: Copy frontend
        run: |
          rsync -av --delete \
            --exclude='benchmark-preview.html' \
            --exclude='benchmark-v3.html' \
            --exclude='taylor-wigton-resume.html' \
            --exclude='benchmark.html' \
            --exclude='index.html' \
            --exclude='appendix.html' \
            --exclude='whitepaper.html' \
            --exclude='payloads/' \
            --exclude='netlify.toml' \
            holo-mvp/frontend/ holo-benchmark/frontend/

      - name: Commit and push
        working-directory: holo-benchmark
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "sync: frontend from holo-mvp@${{ github.sha }}"
          git push
