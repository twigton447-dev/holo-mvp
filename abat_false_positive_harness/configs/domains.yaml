domains:

  - id: accounts_payable
    name: "Accounts Payable / Vendor Disbursement"
    description: >
      AP workflows: vendor invoice review, payment release, hold management,
      compliance screening, and wire disbursement.
    status: active

  - id: procurement
    name: "Procurement / Purchase Order Approval"
    description: >
      Procurement workflows: PO creation, vendor approval, threshold review,
      and multi-level sign-off.
    status: queued

  - id: agentic_commerce
    name: "Agentic Commerce / Autonomous Purchase"
    description: >
      AI agent purchasing: autonomous buying decisions within policy limits,
      supplier confirmation, and spend controls.
    status: queued

  - id: card_issuing
    name: "Card Issuing / Virtual Card Spend"
    description: >
      Virtual card issuance and spend approval: merchant category controls,
      spend limits, and cardholder verification.
    status: queued

  - id: merchant_payouts
    name: "Merchant Payouts"
    description: >
      Platform merchant disbursements: payout eligibility, reserve holds,
      velocity checks, and account verification.
    status: queued

  - id: chargeback_dispute
    name: "Chargeback / Dispute Automation"
    description: >
      Automated chargeback decisions: liability shift, evidence sufficiency,
      and representment authority.
    status: queued

  - id: embedded_finance
    name: "Embedded Finance / Platform Lending"
    description: >
      Platform lending decisions: underwriting rules, draw requests,
      covenant compliance, and disbursement gates.
    status: queued

  - id: identity_access_management
    name: "Identity and Access Management / Emergency Production Access"
    description: >
      IAM workflows: emergency break-glass access, exception-path authorization,
      privileged access review, and policy-bound escalation.
    status: active
    first_packet: IAM_CASE_001
