<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Holo</title>
  <link rel="manifest" href="/static/manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <style>
    :root {
      --bg:       #0a0a0a;
      --bg2:      #141414;
      --bg3:      #1a1a1a;
      --border:   #2a2a2a;
      --border2:  #1a1a1a;
      --text:     #e8e8e8;
      --text2:    #555;
      --text3:    #444;
      --text4:    #666;
      --text5:    #aaa;
      --input-bg: #141414;
    }
    body.light {
      --bg:       #f5f5f5;
      --bg2:      #efefef;
      --bg3:      #e8e8e8;
      --border:   #d0d0d0;
      --border2:  #e0e0e0;
      --text:     #111111;
      --text2:    #888;
      --text3:    #aaa;
      --text4:    #666;
      --text5:    #444;
      --input-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; transition: background 0.2s, color 0.2s; }
    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 760px; margin: 0 auto; }

    /* Messages */
    #messages { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 16px; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; gap: 4px; }
    .msg.user { align-items: flex-end; }
    .msg.holo { align-items: flex-start; }

    .bubble { max-width: 82%; padding: 12px 16px; border-radius: 18px; line-height: 1.55; font-size: 15px; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: #1a56e8; color: #fff; border-bottom-right-radius: 4px; }
    .msg.holo .bubble { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    .label { font-size: 11px; color: var(--text2); padding: 0 4px; }

    /* Next-step chips */
    .chips { display: none; }

    /* Battery */
    .thread-power { display: flex; align-items: center; gap: 6px; padding: 0 4px; margin-top: 4px; }
    .thread-power-label { font-size: 11px; color: #444; }
    .thread-power-bar { font-size: 13px; font-family: monospace; letter-spacing: 1px; }
    .thread-power-bar.green  { color: #22c55e; }
    .thread-power-bar.yellow { color: #eab308; }
    .thread-power-bar.red    { color: #ef4444; }

    /* Typing indicator */
    .typing { display: flex; gap: 5px; padding: 14px 16px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* Input bar */
    #input-bar { padding: 12px 16px 20px; border-top: 1px solid var(--border2); display: flex; gap: 10px; align-items: flex-end; background: var(--bg); }
    #input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-size: 15px; padding: 12px 16px; resize: none; outline: none; min-height: 48px; max-height: 160px; line-height: 1.5; transition: border-color 0.15s; font-family: inherit; }
    #input:focus { border-color: #1a56e8; }
    #input::placeholder { color: var(--text3); }
    #attach { width: 36px; height: 36px; border-radius: 50%; background: none; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    #attach:hover { border-color: var(--text2); background: var(--bg2); }
    #attach svg { fill: var(--text2); }
    #attach:hover svg { fill: var(--text5); }
    #file-input { display: none; }
    .attachment-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 12px; color: var(--text2); margin: 4px 0; }
    .attachment-pill button { background: none; border: none; color: var(--text2); cursor: pointer; padding: 0; font-size: 14px; line-height: 1; }
    #attachments-bar { padding: 0 16px 4px; display: flex; flex-wrap: wrap; gap: 6px; }

    #send { width: 44px; height: 44px; border-radius: 50%; background: #1a56e8; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    #send:hover { background: #1545c0; }
    #send:disabled { background: #222; cursor: not-allowed; }
    #send svg { fill: #fff; }

    /* Mic button */
    #mic { width: 36px; height: 36px; border-radius: 50%; background: none; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    #mic:hover { border-color: var(--text2); background: var(--bg2); }
    #mic svg { fill: var(--text2); transition: fill 0.15s; }
    #mic:hover svg { fill: var(--text5); }
    #mic.listening { border-color: #ef4444; background: rgba(239,68,68,0.1); }
    #mic.listening svg { fill: #ef4444; }

    /* Free-limit banner */
    #free-limit-banner { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 20px; background: rgba(10,10,10,0.92); border-top: 1px solid #2a2a2a; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); font-size: 14px; color: var(--text5); flex-wrap: wrap; }
    #free-limit-banner.hidden { display: none; }
    #free-limit-banner button { padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; }
    #free-limit-banner .btn-signup { background: #1a56e8; color: #fff; }
    #free-limit-banner .btn-signup:hover { background: #1545c0; }
    #free-limit-banner .btn-dismiss { background: none; border: 1px solid var(--border) !important; color: var(--text2); }
    #free-limit-banner .btn-dismiss:hover { border-color: var(--text2) !important; color: var(--text5); }

    /* Thought bubbles */
    #thought-layer { position: fixed; bottom: 80px; left: 0; right: 0; max-width: 760px; margin: 0 auto; pointer-events: none; z-index: 50; overflow: hidden; height: 100dvh; }
    .thought-bubble {
      position: absolute; bottom: 0; pointer-events: all;
      padding: 14px 22px; border-radius: 999px; font-size: 15px; font-weight: 400;
      cursor: pointer; max-width: 340px; text-align: center; line-height: 1.5;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      letter-spacing: 0.01em;
      animation: floatUp 18s cubic-bezier(0.2, 0.05, 0.25, 1) forwards;
      opacity: 0;
    }
    /* Ambient bubbles (during thinking) */
    .thought-bubble.ambient {
      font-size: 17px; padding: 16px 28px;
      font-weight: 300; letter-spacing: 0.03em;
      pointer-events: none;
    }
    .thought-bubble.blue   { background: rgba(26,58,110,0.45); color: #dbeafe; border: 1px solid rgba(29,78,216,0.4); }
    .thought-bubble.yellow { background: rgba(58,46,0,0.45);  color: #fef9c3; border: 1px solid rgba(217,119,6,0.4); }
    .thought-bubble.red    { background: rgba(58,10,10,0.45); color: #fee2e2; border: 1px solid rgba(220,38,38,0.4); }
    .thought-bubble.green  { background: rgba(10,46,26,0.45); color: #dcfce7; border: 1px solid rgba(22,163,74,0.4); }
    .thought-bubble.purple { background: rgba(30,16,64,0.45); color: #ede9fe; border: 1px solid rgba(124,58,237,0.4); }
    .thought-bubble.orange { background: rgba(46,24,0,0.45);  color: #ffedd5; border: 1px solid rgba(234,88,12,0.4); }
    @keyframes floatUp {
      0%   { opacity: 0;    transform: translateY(0)     scale(0.8)  rotate(-1deg); }
      6%   { opacity: 0.75; transform: translateY(-18px) scale(1.02) rotate(0.5deg); }
      40%  { opacity: 0.65; transform: translateY(-35vh) scale(1)    rotate(-0.5deg); }
      75%  { opacity: 0.45; transform: translateY(-60vh) scale(0.97) rotate(0.3deg); }
      90%  { opacity: 0.2;  transform: translateY(-75vh) scale(0.93) rotate(-0.2deg); }
      100% { opacity: 0;    transform: translateY(-85vh) scale(0.88) rotate(0deg); }
    }
    @keyframes floatUpAmbient {
      0%   { opacity: 0;    transform: translateY(0)     scale(0.9); }
      10%  { opacity: 0.7;  transform: translateY(-16px) scale(1); }
      60%  { opacity: 0.55; transform: translateY(-38vh) scale(0.98); }
      100% { opacity: 0;    transform: translateY(-68vh) scale(0.93); }
    }
    .thought-bubble.ambient { animation-name: floatUpAmbient; animation-duration: 20s; }

    /* Holo response fade-in */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.holo { animation: fadeInUp 0.45s ease forwards; }

    /* Header */
    #header { padding: 12px 16px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    #header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; margin: 0; flex-shrink: 0; display: flex; align-items: baseline; gap: 6px; }
    #brand-sub { font-size: 17px; font-weight: 400; color: var(--text2); letter-spacing: 0.3px; transition: opacity 0.4s ease; }
    #header-right { display: flex; align-items: center; gap: 8px; }
    #new-thread { background: none; border: 1px solid var(--border); color: var(--text4); border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    #new-thread:hover { border-color: var(--text2); color: var(--text5); }

    /* Theme toggle */
    #theme-toggle { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 5px 10px; font-size: 13px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
    #theme-toggle:hover { border-color: var(--text2); color: var(--text5); }

    /* Mode toggle */
    .mode-toggle { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .mode-btn { padding: 4px 10px; font-size: 11px; border: none; background: none; color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .mode-btn.active { background: #1a56e8; color: #fff; }

    /* User avatar */
    .avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--border); }
    .avatar-placeholder { width: 28px; height: 28px; border-radius: 50%; background: #1a56e8; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; flex-shrink: 0; }

    /* Sign-in overlay */
    #signin-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; z-index: 100; }
    #signin-overlay h2 { font-size: 28px; font-weight: 600; margin: 0; }
    #signin-overlay p { color: var(--text2); font-size: 15px; margin: 0; text-align: center; max-width: 280px; line-height: 1.6; }
    #signin-overlay.hidden { display: none; }

    /* Empty state */
    #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text3); padding: 32px; text-align: center; }
    #empty h2 { font-size: 22px; font-weight: 600; color: var(--text2); margin: 0; }
    #empty p { font-size: 14px; line-height: 1.6; max-width: 300px; margin: 0; }
  </style>
</head>
<body>
<!-- Free-limit banner -->
<div id="free-limit-banner" class="hidden">
  <span>You've reached the free limit. Sign up to continue — it's free.</span>
  <button class="btn-signup" onclick="showSignInOverlay()">Sign up</button>
  <button class="btn-dismiss" onclick="dismissFreeLimitBanner()">Continue anyway</button>
</div>

<!-- Sign-in overlay -->
<div id="signin-overlay">
  <h2>Holo</h2>
  <p>Your second brain. Sign in to bring your capsule with you.</p>

  <!-- Google sign-in (requires Google Client ID to be configured) -->
  <div id="g_id_onload"
    data-client_id="GOOGLE_CLIENT_ID_PLACEHOLDER"
    data-callback="onGoogleSignIn"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="filled_black"
    data-text="sign_in_with"
    data-shape="pill"
    data-logo_alignment="left">
  </div>

  <!-- Divider -->
  <div style="display:flex;align-items:center;gap:12px;width:100%;max-width:280px;margin:4px 0;">
    <div style="flex:1;height:1px;background:#222;"></div>
    <span style="color:#333;font-size:12px;">or</span>
    <div style="flex:1;height:1px;background:#222;"></div>
  </div>

  <!-- Email sign-in -->
  <div id="email-signin-form" style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;">
    <input id="signin-name"  type="text"  placeholder="Your name"  autocomplete="name"
      style="background:#111;border:1px solid #2a2a2a;color:#e8e8e8;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;width:100%;" />
    <input id="signin-email" type="email" placeholder="Your email" autocomplete="email"
      style="background:#111;border:1px solid #2a2a2a;color:#e8e8e8;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;width:100%;" />
    <button onclick="emailSignIn()"
      style="background:#1a56e8;border:none;color:#fff;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;width:100%;">
      Continue
    </button>
    <div id="signin-error" style="color:#ef4444;font-size:12px;text-align:center;display:none;"></div>
  </div>

  <button onclick="skipSignIn()" style="background:none;border:none;color:#333;font-size:13px;cursor:pointer;margin-top:4px;">Continue without signing in</button>
</div>

<div id="app">
  <div id="header">
    <h1>Holo <span id="brand-sub">Chat</span></h1>
    <div id="header-right">
      <div class="mode-toggle" id="mode-toggle" style="display:none">
        <button class="mode-btn active" id="btn-personal" onclick="switchMode('personal')">Personal</button>
        <button class="mode-btn" id="btn-work" onclick="switchMode('work')">Work</button>
      </div>
      <button id="new-thread" onclick="newThread()">New thread</button>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀</button>
      <div id="user-avatar" style="display:none"></div>
    </div>
  </div>

  <div id="messages">
    <div id="empty">
      <h2>What's on your mind?</h2>
      <p>Holo is here — truth-seeking, Stoic, and ready for whatever you bring.</p>
    </div>
  </div>

  <div id="attachments-bar"></div>
  <div id="input-bar">
    <input type="file" id="file-input" multiple onchange="handleFiles(this)" />
    <button id="attach" onclick="document.getElementById('file-input').click()" title="Attach file">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <button id="mic" onclick="toggleVoice()" title="Voice input" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zm-4 7a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.93V21h2v2H9v-2h2v-2.07A7 7 0 0 1 5 11H7z"/></svg>
    </button>
    <textarea id="input" placeholder="Ask Holo anything…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="thought-layer"></div>
</div>

<script>
  const API_KEY      = "holo_sk_d3b9785eeec3a522b228058e0bc8c43d";
  let   sessionId    = null;
  let   isLoading    = false;
  let   capsuleToken = localStorage.getItem("holo_capsule_token") || null;
  let   capsuleMode  = localStorage.getItem("holo_capsule_mode") || "personal";
  let   turnCount    = 0;
  const FREE_TURN_LIMIT = 8;

  // ---- Attachments ---------------------------------------------------------

  let attachedFiles = [];

  function handleFiles(input) {
    for (const file of input.files) {
      attachedFiles.push(file);
      renderAttachmentPill(file);
    }
    input.value = "";
  }

  function renderAttachmentPill(file) {
    const bar  = document.getElementById("attachments-bar");
    const pill = document.createElement("div");
    pill.className   = "attachment-pill";
    pill.dataset.name = file.name;
    pill.innerHTML   = `📎 ${escHtml(file.name)} <button onclick="removeAttachment('${escHtml(file.name)}', this.parentElement)">×</button>`;
    bar.appendChild(pill);
  }

  function removeAttachment(name, el) {
    attachedFiles = attachedFiles.filter(f => f.name !== name);
    el.remove();
  }

  const IMAGE_TYPES = ["image/jpeg", "image/jpg", "image/png", "image/gif", "image/webp"];

  function isImageFile(file) {
    return IMAGE_TYPES.includes(file.type) ||
      /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
  }

  async function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => {
        // result is "data:image/png;base64,<data>" — strip the prefix
        const dataUrl = reader.result;
        const comma   = dataUrl.indexOf(",");
        resolve(dataUrl.slice(comma + 1));
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function readFileAsText(file) {
    if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        pages.push(content.items.map(item => item.str).join(" "));
      }
      return pages.join("\n\n");
    }
    return await file.text();
  }

  async function readAttachmentsAsText() {
    const parts  = [];
    const images = [];
    for (const file of attachedFiles) {
      if (isImageFile(file)) {
        try {
          const data = await readFileAsBase64(file);
          images.push({ name: file.name, data, mimeType: file.type || "image/jpeg" });
        } catch { parts.push(`\n\n[Attached image: ${file.name} — could not read]`); }
      } else {
        try {
          const text = await readFileAsText(file);
          parts.push(`\n\n[Attached: ${file.name}]\n${text.slice(0, 6000)}`);
        } catch { parts.push(`\n\n[Attached: ${file.name} — could not read]`); }
      }
    }
    return { text: parts.join(""), images };
  }

  // ---- Theme ---------------------------------------------------------------

  function toggleTheme() {
    const isLight = document.body.classList.toggle("light");
    document.getElementById("theme-toggle").textContent = isLight ? "☾" : "☀";
    localStorage.setItem("holo_theme", isLight ? "light" : "dark");
  }

  // Restore saved theme
  if (localStorage.getItem("holo_theme") === "light") {
    document.body.classList.add("light");
    document.getElementById("theme-toggle").textContent = "☾";
  }

  // ---- Brand sub-word cycle ------------------------------------------------
  const BRAND_WORDS = ["Chat", "Protect", "Legal", "Learn", "Shop", "Listen", "Homes"];
  let _brandIndex = 0;
  const _brandEl  = document.getElementById("brand-sub");

  setInterval(() => {
    _brandEl.style.opacity = "0";
    setTimeout(() => {
      _brandIndex = (_brandIndex + 1) % BRAND_WORDS.length;
      _brandEl.textContent = BRAND_WORDS[_brandIndex];
      _brandEl.style.opacity = "1";
    }, 400);
  }, 3000);

  // ---- Thought bubbles -----------------------------------------------------

  const AMBIENT_THOUGHTS = [
    { text: "Breathe.",                               color: "blue"   },
    { text: "You're doing better than you think.",    color: "green"  },
    { text: "One thing at a time.",                   color: "purple" },
    { text: "Rest is productive.",                    color: "blue"   },
    { text: "Most things work out.",                  color: "green"  },
    { text: "It's okay not to know yet.",             color: "purple" },
    { text: "Progress isn't always visible.",         color: "orange" },
    { text: "You've handled harder things than this.",color: "blue"   },
    { text: "What would you tell a friend right now?",color: "yellow" },
    { text: "Slow down for a second.",                color: "blue"   },
    { text: "The answer usually comes when you stop chasing it.", color: "purple" },
    { text: "Not everything needs to be figured out today.",      color: "green"  },
    { text: "You're allowed to change your mind.",    color: "orange" },
    { text: "What matters most right now?",           color: "blue"   },
    { text: "Something good happened today.",         color: "green"  },
  ];

  let _ambientInterval = null;

  function startAmbientBubbles() {
    // One bubble only, after a short natural delay
    _ambientInterval = setTimeout(() => {
      spawnAmbient();
      _ambientInterval = null;
    }, 1200);
  }

  function spawnAmbient() {
    const t = AMBIENT_THOUGHTS[Math.floor(Math.random() * AMBIENT_THOUGHTS.length)];
    spawnThought(t, true);
  }

  function stopAmbientBubbles() {
    if (_ambientInterval) { clearTimeout(_ambientInterval); _ambientInterval = null; }
  }

  function spawnThought(thought, ambient = false) {
    if (!thought || !thought.text) return;
    const layer  = document.getElementById("thought-layer");
    const bubble = document.createElement("div");
    bubble.className = `thought-bubble ${thought.color || "blue"}${ambient ? " ambient" : ""}`;
    bubble.textContent = thought.text;

    const leftPct = 5 + Math.random() * 70;
    bubble.style.left = `${leftPct}%`;

    if (!ambient) bubble.addEventListener("click", () => bubble.remove());
    layer.appendChild(bubble);

    setTimeout(() => bubble.remove(), ambient ? 20000 : 14000);
  }

  const _DEMO_THOUGHTS = [
    { text: "You haven't taken a real break in weeks.",       color: "red"    },
    { text: "This problem and the last one are the same one.", color: "blue"   },
    { text: "You keep circling this — what are you afraid of?", color: "yellow" },
    { text: "You're building something that matters.",         color: "green"  },
    { text: "There's a pattern here you haven't named yet.",  color: "orange" },
    { text: "What if the constraint is actually the insight?", color: "purple" },
  ];
  let _demoIdx = 0;

  function demoThought() {
    spawnThought(_DEMO_THOUGHTS[_demoIdx % _DEMO_THOUGHTS.length]);
    _demoIdx++;
  }

  // ---- Auth ----------------------------------------------------------------

  function onGoogleSignIn(response) {
    fetch("/auth/google", {
      method:  "POST",
      headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
      body:    JSON.stringify({ credential: response.credential }),
    })
    .then(r => r.json())
    .then(data => {
      capsuleToken = data.capsule_token;
      capsuleMode  = data.mode || "personal";
      localStorage.setItem("holo_capsule_token", capsuleToken);
      localStorage.setItem("holo_capsule_mode",  capsuleMode);
      showCapsule(data);
      document.getElementById("signin-overlay").classList.add("hidden");
    })
    .catch(() => skipSignIn());
  }

  async function emailSignIn() {
    const name  = document.getElementById("signin-name").value.trim();
    const email = document.getElementById("signin-email").value.trim();
    const errEl = document.getElementById("signin-error");
    errEl.style.display = "none";

    if (!email || !email.includes("@")) {
      errEl.textContent = "Please enter a valid email.";
      errEl.style.display = "block";
      return;
    }

    try {
      const res  = await fetch("/auth/email", {
        method:  "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
        body:    JSON.stringify({ email, name }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Sign-in failed.");
      capsuleToken = data.capsule_token;
      capsuleMode  = data.mode || "personal";
      localStorage.setItem("holo_capsule_token", capsuleToken);
      localStorage.setItem("holo_capsule_mode",  capsuleMode);
      showCapsule(data);
      document.getElementById("signin-overlay").classList.add("hidden");
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = "block";
    }
  }

  function skipSignIn() {
    document.getElementById("signin-overlay").classList.add("hidden");
  }

  function showCapsule(data) {
    const avatarEl = document.getElementById("user-avatar");
    const modeEl   = document.getElementById("mode-toggle");
    avatarEl.style.display = "";
    modeEl.style.display   = "";

    if (data.avatar_url) {
      avatarEl.innerHTML = `<img class="avatar" src="${data.avatar_url}" title="${data.name || data.email}" />`;
    } else {
      const initial = (data.name || data.email || "?")[0].toUpperCase();
      avatarEl.innerHTML = `<div class="avatar-placeholder" title="${data.name || data.email}">${initial}</div>`;
    }
    updateModeUI(capsuleMode);
  }

  function switchMode(mode) {
    if (!capsuleToken) return;
    capsuleMode = mode;
    localStorage.setItem("holo_capsule_mode", mode);
    updateModeUI(mode);
    fetch("/auth/mode", {
      method:  "POST",
      headers: {
        "Content-Type":  "application/json",
        "x-api-key":     API_KEY,
        "Authorization": `Bearer ${capsuleToken}`,
      },
      body: JSON.stringify({ mode }),
    }).catch(() => {});
  }

  function updateModeUI(mode) {
    document.getElementById("btn-personal").classList.toggle("active", mode === "personal");
    document.getElementById("btn-work").classList.toggle("active", mode === "work");
  }

  // Restore capsule UI if already signed in
  if (capsuleToken) {
    fetch("/auth/me", {
      headers: { "x-api-key": API_KEY, "Authorization": `Bearer ${capsuleToken}` }
    })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data) {
        showCapsule({ ...data, name: data.email });
        document.getElementById("signin-overlay").classList.add("hidden");
      }
    })
    .catch(() => {});
  }

  function authHeaders() {
    const h = { "Content-Type": "application/json", "x-api-key": API_KEY };
    if (capsuleToken) h["Authorization"] = `Bearer ${capsuleToken}`;
    return h;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("input");
    const text  = input.value.trim();
    if (!text) return;

    // Clear empty state
    document.getElementById("empty")?.remove();

    // Read any attachments — text files appended to message, images sent separately
    const { text: attachmentText, images } = await readAttachmentsAsText();
    const fullMessage = text + attachmentText;

    input.value = "";
    autoResize(input);
    attachedFiles = [];
    document.getElementById("attachments-bar").innerHTML = "";
    isLoading = true;
    document.getElementById("send").disabled = true;

    appendMessage("user", text); // show only the typed text, not raw file contents
    const typingEl = appendTyping();
    scrollToBottom();
    startAmbientBubbles();

    try {
      const body = { message: fullMessage, session_id: sessionId };
      if (images && images.length > 0) body.images = images;

      const res = await fetch("/v1/chat", {
        method:  "POST",
        headers: authHeaders(),
        body:    JSON.stringify(body),
      });

      stopAmbientBubbles();
      typingEl.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendError(err.detail || `Error ${res.status}`);
        return;
      }

      const data = await res.json();
      sessionId  = data.session_id;
      appendHoloMessage(data);

      // Track turns and show free-limit banner if needed
      turnCount++;
      if (turnCount === FREE_TURN_LIMIT && !capsuleToken) {
        document.getElementById("free-limit-banner").classList.remove("hidden");
      }

      // Thought bubble from Pilot — slight delay so it feels organic
      if (data.thought) {
        setTimeout(() => spawnThought(data.thought), 1800);
      }
    } catch (e) {
      stopAmbientBubbles();
      typingEl.remove();
      appendError("Network error — check that the Holo server is running.");
    } finally {
      isLoading = false;
      document.getElementById("send").disabled = false;
      scrollToBottom();
    }
  }

  function appendMessage(role, text) {
    const container = document.getElementById("messages");
    const msg       = document.createElement("div");
    msg.className   = `msg ${role}`;
    msg.innerHTML   = `<div class="bubble">${escHtml(text)}</div>`;
    container.appendChild(msg);
    return msg;
  }

  function appendHoloMessage(data) {
    const container = document.getElementById("messages");
    const msg       = document.createElement("div");
    msg.className   = "msg holo";

    const { mainText, battery, suggestions } = parseResponse(data.response);

    let html = `<div class="bubble">${renderMarkdown(mainText)}</div>`;

    if (battery) {
      html += renderBattery(battery);
    }

    if (suggestions.length) {
      html += `<div class="chips">` + suggestions.map(s =>
        `<div class="chip" onclick="useChip(this)">${escHtml(s)}</div>`
      ).join("") + `</div>`;
    }

    msg.innerHTML = html;
    container.appendChild(msg);
  }

  function appendTyping() {
    const container = document.getElementById("messages");
    const el        = document.createElement("div");
    el.className    = "msg holo";
    el.innerHTML    = `<div class="bubble" style="padding:12px 16px"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    container.appendChild(el);
    return el;
  }

  function appendError(msg) {
    const container = document.getElementById("messages");
    const el        = document.createElement("div");
    el.className    = "msg holo";
    el.innerHTML    = `<div class="bubble" style="color:#f87171;border-color:#3a1a1a">${escHtml(msg)}</div>`;
    container.appendChild(el);
  }

  function renderBattery(line) {
    return "";
  }

  function parseResponse(text) {
    // Extract thread power line
    const batteryMatch = text.match(/Thread power:[^\n]+/);
    const battery      = batteryMatch ? batteryMatch[0] : null;

    // Extract Next-step suggestions section
    const suggestMatch = text.match(/Next-step suggestions[:\s\n]+([\s\S]*?)(?:\n\nThread battery:|$)/i);
    const suggestions  = [];
    if (suggestMatch) {
      const lines = suggestMatch[1].split("\n");
      for (const line of lines) {
        const m = line.match(/^\s*\d+[.)]\s+(.+)/);
        if (m) suggestions.push(m[1].trim());
      }
    }

    // Remove battery + suggestions block from main text
    let mainText = text
      .replace(/\n*Next-step suggestions[:\s\n]+([\s\S]*?)(?:\n\nThread power:|$)/i, "")
      .replace(/\n*Thread power:[^\n]+/, "")
      .replace(/\s*\[(GREEN|YELLOW|RED)\]\s*[█░]+/g, "")
      .trim();

    return { mainText, battery, suggestions };
  }

  function useChip(el) {
    const input = document.getElementById("input");
    input.value = el.textContent;
    autoResize(input);
    input.focus();
  }

  function newThread() {
    if (!confirm("Start a new thread? This clears the current conversation.")) return;
    if (sessionId) {
      fetch(`/v1/chat/${sessionId}`, {
        method:  "DELETE",
        headers: authHeaders(),
      }).catch(() => {});
    }
    sessionId  = null;
    turnCount  = 0;
    document.getElementById("free-limit-banner").classList.add("hidden");
    const container = document.getElementById("messages");
    container.innerHTML = `<div id="empty">
      <h2>What's on your mind?</h2>
      <p>Holo is here — truth-seeking, Stoic, and ready for whatever you bring.</p>
    </div>`;
  }

  function scrollToBottom() {
    const container = document.getElementById("messages");
    container.scrollTop = container.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // Minimal markdown: bold, italic, code, bullets, headers
  function renderMarkdown(text) {
    let s = escHtml(text);
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
    s = s.replace(/`([^`]+)`/g, "<code style='background:#0d0d0d;padding:2px 5px;border-radius:4px;font-size:13px'>$1</code>");
    s = s.replace(/^#{1,3} (.+)$/gm, "<strong>$1</strong>");
    s = s.replace(/^[-*] (.+)$/gm, "• $1");
    s = s.replace(/\n/g, "<br>");
    return s;
  }

  // ---- Voice input (Web Speech API) ----------------------------------------

  let _recognition = null;
  let _voiceActive = false;

  (function initVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return; // browser doesn't support it — button stays hidden
    const micBtn = document.getElementById("mic");
    micBtn.style.display = "";

    _recognition = new SpeechRecognition();
    _recognition.continuous     = false;
    _recognition.interimResults = false;
    _recognition.lang           = "en-US";

    _recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      const input      = document.getElementById("input");
      input.value      = (input.value ? input.value + " " : "") + transcript;
      autoResize(input);
      input.focus();
      stopVoice();
    };

    _recognition.onerror = () => stopVoice();
    _recognition.onend   = () => stopVoice();
  })();

  function toggleVoice() {
    if (_voiceActive) {
      stopVoice();
    } else {
      startVoice();
    }
  }

  function startVoice() {
    if (!_recognition) return;
    _voiceActive = true;
    document.getElementById("mic").classList.add("listening");
    _recognition.start();
  }

  function stopVoice() {
    _voiceActive = false;
    document.getElementById("mic").classList.remove("listening");
    try { _recognition && _recognition.stop(); } catch (_) {}
  }

  // ---- Free-limit banner helpers -------------------------------------------

  function showSignInOverlay() {
    document.getElementById("free-limit-banner").classList.add("hidden");
    document.getElementById("signin-overlay").classList.remove("hidden");
  }

  function dismissFreeLimitBanner() {
    document.getElementById("free-limit-banner").classList.add("hidden");
  }
</script>
