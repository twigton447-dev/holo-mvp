<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holo Engine — Pre-execution adjudication for AI agent actions</title>
  <meta name="description" content="Before an AI agent acts, Holo returns ALLOW or ESCALATE. Pre-execution adjudication for high-consequence AI agent actions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script data-goatcounter="https://holoengine.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

  <style>
    :root {
      --bg:         #020812;
      --bg-2:       #06111f;
      --gold:       #f5b936;
      --gold-soft:  rgba(245, 185, 54, 0.45);
      --gold-faint: rgba(245, 185, 54, 0.14);
      --white:      #f5f1e8;
      --muted:      rgba(245, 241, 232, 0.72);
      --mono:       'JetBrains Mono', 'Courier New', Courier, monospace;
      --serif:      'EB Garamond', Georgia, 'Times New Roman', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--mono);
    }

    body { overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }

    /* ── PAGE ── */
    .page {
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 72% 48%, rgba(245, 185, 54, 0.09), transparent 28%),
        radial-gradient(circle at 18% 25%, rgba(90, 135, 180, 0.08), transparent 35%),
        linear-gradient(115deg, #020812 0%, #06111f 48%, #020812 100%);
      overflow: hidden;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.22) 68%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
    }

    /* ── FULL-PAGE PARTICLE CANVAS ── */
    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── NAV ── */
    .nav {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 42px 56px 0;
    }

    .brand {
      text-decoration: none;
      color: var(--white);
      line-height: 1;
      display: inline-block;
    }

    .brand-main {
      display: block;
      font-family: var(--serif);
      font-size: clamp(32px, 3.2vw, 52px);
      letter-spacing: 0.38em;
      font-weight: 400;
      color: var(--white);
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.14);
    }

    .brand-sub {
      display: block;
      margin-top: 12px;
      font-family: var(--mono);
      font-size: clamp(13px, 1.3vw, 20px);
      letter-spacing: 0.68em;
      color: var(--gold);
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      gap: 44px;
      align-items: center;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nav-links a {
      color: var(--muted);
      opacity: 0.75;
      transition: opacity 0.15s, color 0.15s;
    }
    .nav-links a:hover { opacity: 1; color: var(--gold); }

    .nav-cta {
      color: var(--gold);
      border: 1px solid var(--gold-soft);
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-cta:hover { background: rgba(245, 185, 54, 0.08); border-color: var(--gold); }
    .nav-cta:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 3;
      min-height: calc(100vh - 120px);
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 32px;
      align-items: center;
      padding: 40px 56px 72px;
    }

    .copy { max-width: 720px; padding-top: 42px; }

    h1 {
      font-family: var(--mono);
      font-size: clamp(44px, 5.1vw, 82px);
      line-height: 1.18;
      font-weight: 300;
      letter-spacing: -0.055em;
      color: var(--white);
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.10);
      max-width: 800px;
    }

    .subcopy {
      margin-top: 26px;
      font-size: clamp(16px, 1.4vw, 22px);
      line-height: 1.55;
      color: var(--muted);
      max-width: 620px;
      letter-spacing: -0.02em;
    }

    .actions {
      display: flex;
      gap: 22px;
      margin-top: 42px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-width: 200px;
      padding: 16px 26px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: -0.01em;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }
    .button:hover { transform: translateY(-1px); }
    .button:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

    .button-primary {
      background: linear-gradient(180deg, #ffd76a 0%, #f2b633 100%);
      color: #090909;
      box-shadow: 0 0 26px rgba(245, 185, 54, 0.26);
    }

    .button-secondary {
      color: var(--gold);
      border: 1px solid var(--gold-soft);
      background: rgba(0, 0, 0, 0.08);
    }
    .button-secondary:hover {
      border-color: var(--gold);
      background: rgba(245, 185, 54, 0.07);
    }

    /* ── RADAR ── */
    .radar-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 680px;
    }

    .radar {
      position: relative;
      width: min(720px, 48vw);
      aspect-ratio: 1;
      border-radius: 50%;
      filter: drop-shadow(0 0 22px rgba(245, 185, 54, 0.10));
    }

    /* Fewer rings, lower opacity */
    .radar-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        repeating-radial-gradient(
          circle,
          transparent 0,
          transparent 68px,
          rgba(245, 185, 54, 0.11) 69px,
          transparent 71px
        ),
        repeating-conic-gradient(
          from 0deg,
          rgba(245, 185, 54, 0.09) 0deg,
          rgba(245, 185, 54, 0.09) 0.4deg,
          transparent 0.6deg,
          transparent 30deg
        ),
        radial-gradient(circle, rgba(245, 185, 54, 0.08) 0%, rgba(245, 185, 54, 0.02) 42%, transparent 72%);
      border: 1px solid rgba(245, 185, 54, 0.22);
      box-shadow:
        inset 0 0 28px rgba(245, 185, 54, 0.06),
        0 0 24px rgba(245, 185, 54, 0.04);
    }

    .radar-core::before,
    .radar-core::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 0;
      width: 100%;
      height: 1px;
      background: rgba(245, 185, 54, 0.18);
      transform-origin: center;
    }
    .radar-core::after { transform: rotate(90deg); }

    .sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 132deg,
        transparent 0deg,
        transparent 300deg,
        rgba(245, 185, 54, 0.04) 312deg,
        rgba(245, 185, 54, 0.42) 336deg,
        rgba(245, 185, 54, 0.01) 354deg,
        transparent 360deg
      );
      animation: sweepTurn 52s linear infinite;
      mix-blend-mode: screen;
      filter: blur(0.4px);
    }

    .center-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 7px; height: 7px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #ffd76a;
      box-shadow: 0 0 8px #ffd76a, 0 0 22px rgba(245, 185, 54, 0.55);
      z-index: 2;
    }

    /* Degree labels — tiny, symbolic */
    .degree {
      position: absolute;
      color: var(--gold);
      font-size: 7px;
      letter-spacing: 0.05em;
      opacity: 0.32;
    }
    .d0   { top: -18px;  left: 49%; }
    .d90  { top: 49%;    right: -36px; }
    .d180 { bottom: -20px; left: 49%; }
    .d270 { top: 49%;    left: -33px; }

    /* HUD panels */
    .hud {
      position: absolute;
      color: var(--gold);
      border: 1px solid rgba(245, 185, 54, 0.22);
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.6;
      background: rgba(0, 0, 0, 0.10);
      opacity: 0.65;
    }
    .hud-top    { top: 74px;   right: 30px; }
    .hud-bottom { right: 30px; bottom: 64px; }

    /* Crosshair decorators */
    .cross {
      position: absolute;
      width: 28px; height: 28px;
      opacity: 0.45;
    }
    .cross::before, .cross::after {
      content: "";
      position: absolute;
      background: var(--gold);
    }
    .cross::before { width: 100%; height: 1px; top: 50%; left: 0; }
    .cross::after  { width: 1px; height: 100%; left: 50%; top: 0; }
    .cross-one { top: 96px; left: 42px; }
    .cross-two { right: -18px; top: 44%; }

    /* ── ANIMATIONS ── */
    @keyframes sweepTurn {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .nav { padding: 32px 28px 0; }
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; padding: 36px 28px 64px; }
      .copy { padding-top: 20px; }
      .radar-wrap { min-height: 520px; margin-top: 30px; }
      .radar { width: min(680px, 86vw); }
      .hud-top, .hud-bottom { right: 0; }
    }

    @media (max-width: 640px) {
      .nav-cta { display: none; }
      .brand-main { font-size: 30px; }
      .brand-sub  { font-size: 12px; }
      h1 { font-size: 40px; line-height: 1.2; }
      .subcopy { font-size: 17px; }
      .button { width: 100%; }
      .radar-wrap { min-height: 420px; }
      .degree, .hud, .cross-two { display: none; }
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- PARTICLE CANVAS -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <header class="nav">
      <a class="brand" href="/" aria-label="Holo Engine home">
        <span class="brand-main">HOLO</span>
        <span class="brand-sub">ENGINE</span>
      </a>

      <nav class="nav-links" aria-label="Main navigation">
        <a href="/whitepaper">Whitepaper</a>
        <a href="/benchmark">Benchmark</a>
        <a href="/appendix/payloads">Payloads</a>
        <a href="https://github.com/twigton447-dev/holo-benchmark" target="_blank" rel="noopener">GitHub</a>
      </nav>

      <a class="nav-cta" href="/whitepaper">Read whitepaper &rarr;</a>
    </header>

    <section class="hero" aria-label="Hero">

      <div class="copy">
        <h1>Navigating AI blind spots at the moment of decision</h1>
        <p class="subcopy">Before an AI agent acts, Holo returns ALLOW or ESCALATE.</p>
        <div class="actions">
          <a class="button button-primary" href="/whitepaper">Read whitepaper &rarr;</a>
          <a class="button button-secondary" href="/benchmark">View benchmark &rarr;</a>
        </div>
      </div>

      <div class="radar-wrap" aria-hidden="true">
        <div class="cross cross-one"></div>
        <div class="cross cross-two"></div>

        <div class="hud hud-top">
          34.0522° N<br />
          118.2437° W
        </div>

        <div class="radar">
          <div class="radar-core"></div>
          <div class="sweep"></div>
          <div class="center-dot"></div>

          <span class="degree d0">000</span>
          <span class="degree d90">090</span>
          <span class="degree d180">180</span>
          <span class="degree d270">270</span>
        </div>

        <div class="hud hud-bottom">
          BEARING 128°<br />
          RANGE 302 KM
        </div>
      </div>

    </section>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');

      const GOLD  = [245, 185, 54];
      const WHITE = [220, 215, 205];
      const BLUE  = [100, 160, 220];

      const MODELS = [
        'GPT-5.5', 'GPT-5.5', 'GPT-5.5', 'GPT-5.5', 'GPT-5.5',
        'GPT-5.5', 'GPT-5.5', 'GPT-5.5', 'GPT-5.5', 'GPT-5.5',
        'Claude 4.6', 'Claude 4.6', 'Claude 4.6', 'Claude 4.6', 'Claude 4.6',
        'Claude 4.6', 'Claude 4.6', 'Claude 4.6', 'Claude 4.6', 'Claude 4.6',
        'Gemini 3.1', 'Gemini 3.1', 'Gemini 3.1', 'Gemini 3.1', 'Gemini 3.1',
        'Gemini 3.1', 'Gemini 3.1', 'Gemini 3.1', 'Gemini 3.1', 'Gemini 3.1',
        'Claude Opus 4.7', 'Claude Opus 4.7', 'Claude Opus 4.7', 'Claude Opus 4.7',
        'GPT-4o', 'GPT-4o', 'GPT-4o', 'GPT-4o',
        'Gemini 2.0', 'Gemini 2.0', 'Gemini 2.0',
        'Llama 4', 'Llama 4', 'Llama 4',
        'Mistral Large', 'Mistral Large',
        'Grok 3', 'Grok 3',
        'DeepSeek R2', 'DeepSeek R2',
      ];

      let W, H, dpr, particles;

      function rand(a, b) { return a + Math.random() * (b - a); }
      function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

      function makeParticle(labeled) {
        const color = Math.random() < 0.55 ? GOLD : Math.random() < 0.6 ? WHITE : BLUE;
        return {
          x: rand(0, W),
          y: rand(0, H),
          vx: rand(-0.12, 0.12),
          vy: rand(-0.12, 0.12),
          r: labeled ? rand(1.4, 2.2) : rand(0.4, 1.1),
          alpha: labeled ? rand(0.28, 0.52) : rand(0.06, 0.22),
          color,
          label: labeled ? pick(MODELS) : null,
          pulse: rand(0, Math.PI * 2),
          pulseSpeed: rand(0.004, 0.012),
        };
      }

      function build() {
        dpr = window.devicePixelRatio || 1;
        W = canvas.offsetWidth;
        H = canvas.offsetHeight;
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        ctx.scale(dpr, dpr);

        particles = [];
        // ~1400 background specks
        for (let i = 0; i < 1400; i++) particles.push(makeParticle(false));
        // labeled model dots — one per MODELS entry × ~2 instances
        for (let i = 0; i < MODELS.length * 2; i++) particles.push(makeParticle(true));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < -40) p.x = W + 40;
          if (p.x > W + 40) p.x = -40;
          if (p.y < -40) p.y = H + 40;
          if (p.y > H + 40) p.y = -40;

          p.pulse += p.pulseSpeed;
          const alphaFactor = p.label ? 0.7 + 0.3 * Math.sin(p.pulse) : 1;
          const a = p.alpha * alphaFactor;
          const [r, g, b] = p.color;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
          ctx.fill();

          if (p.label) {
            ctx.font = '7px JetBrains Mono, Courier New, monospace';
            ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(a * 0.85, 0.38)})`;
            ctx.fillText(p.label, p.x + p.r + 3, p.y + 3);
          }
        }

        requestAnimationFrame(draw);
      }

      build();
      draw();
      window.addEventListener('resize', build);
    })();
  </script>
</body>
</html>
