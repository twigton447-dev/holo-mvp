<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HoloChat Runtime</title>
  <style>
    :root {
      --bg: #0d1014;
      --panel: #151a20;
      --panel-2: #1c232b;
      --line: #303a45;
      --text: #eef3f7;
      --muted: #9aa8b5;
      --good: #7dd3a7;
      --warn: #f4c76b;
      --bad: #f08a8a;
      --accent: #9fc7ff;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #10151a;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 18px; font-weight: 760; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .stamp {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      border: 1px solid var(--line);
      padding: 8px 10px;
      background: var(--panel);
      border-radius: 6px;
      min-width: 180px;
      text-align: right;
    }
    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 18px auto 34px;
      display: grid;
      gap: 14px;
    }
    section {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }
    h2 { margin: 0; font-size: 13px; text-transform: uppercase; color: var(--muted); letter-spacing: .06em; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0; }
    .row {
      min-height: 54px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .row:nth-child(odd) { border-right: 1px solid var(--line); }
    .key {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 760;
      margin-bottom: 5px;
    }
    .val {
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .mono { font-family: var(--mono); }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      background: #10151a;
      margin: 2px 4px 2px 0;
    }
    .ok { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      background: #11171d;
    }
    td { overflow-wrap: anywhere; }
    pre {
      margin: 0;
      padding: 12px 14px;
      overflow: auto;
      max-height: 360px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      color: #d8e1ea;
      background: #0b0f13;
    }
    @media (max-width: 760px) {
      header { align-items: flex-start; }
      .stamp { width: 100%; text-align: left; }
      .grid { grid-template-columns: 1fr; }
      .row:nth-child(odd) { border-right: 0; }
      table { font-size: 12px; }
      th, td { padding: 9px 8px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>HoloChat Runtime</h1>
      <div class="sub">Live build, model roster, Gov state, shadow lane, and safety redactions.</div>
    </div>
    <div id="stamp" class="stamp">loading</div>
  </header>
  <main id="app"></main>

  <script>
    const app = document.getElementById("app");
    const stamp = document.getElementById("stamp");
    const esc = value => String(value ?? "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
    const yesNo = value => value === true ? '<span class="ok">yes</span>' : value === false ? '<span class="warn">no</span>' : "unknown";
    const val = value => {
      if (Array.isArray(value)) return value.length ? value.map(item => `<span class="pill">${esc(item)}</span>`).join("") : "none";
      if (value === true || value === false) return yesNo(value);
      if (value === null || value === undefined || value === "") return "unknown";
      return esc(value);
    };
    const row = (key, value) => `<div class="row"><div class="key">${esc(key)}</div><div class="val">${val(value)}</div></div>`;
    const section = (title, body, right = "") => `
      <section>
        <div class="section-head"><h2>${esc(title)}</h2><div class="mono">${right}</div></div>
        ${body}
      </section>`;
    const grid = rows => `<div class="grid">${rows.map(([k, v]) => row(k, v)).join("")}</div>`;
    const table = (columns, rows) => `
      <table>
        <thead><tr>${columns.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead>
        <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${val(c)}</td>`).join("")}</tr>`).join("")}</tbody>
      </table>`;

    function render(data) {
      const release = data.release || {};
      const hc = data.holochat || {};
      const lane = hc.visible_chat_lane || {};
      const gov = hc.governor || {};
      const shadow = hc.governed_shadow_lane || {};
      const memory = hc.state_and_memory || {};
      const safety = hc.safety || {};
      stamp.textContent = release.build_label || release.app_version || "unknown";

      const activeRows = (lane.analyst_rotation_order || []).map((item, idx) => [
        String(idx + 1),
        item.provider || "unknown",
        item.model || "unknown",
        idx === 0 ? "next after restart/session reset" : "round-robin"
      ]);
      const benchRows = (lane.bench_pool || []).map((item, idx) => [
        String(idx + 1),
        item.provider || "unknown",
        item.model || "unknown"
      ]);
      const shadowRows = (shadow.expected_call_sequence || []).map(item => [
        item.slot || "",
        item.role || "",
        item.provider || "",
        item.model || "",
        item.worker_role || item.gov_role || ""
      ]);

      app.innerHTML = [
        section("Release", grid([
          ["App version", release.app_version],
          ["Architecture version", release.architecture_version],
          ["Build label", release.build_label],
          ["Git commit", release.git_commit_short || release.git_commit],
          ["Git branch", release.git_branch],
          ["Deploy service", release.deploy_service],
          ["Deploy environment", release.deploy_environment],
          ["Deploy instance", release.deploy_instance],
        ])),
        section("Visible HoloChat Lane", grid([
          ["Status", hc.status],
          ["Runtime profile", lane.runtime_profile],
          ["Runtime class", lane.runtime_class],
          ["Manifest version", lane.architecture_manifest_version],
          ["Profile status", lane.architecture_profile_status],
          ["Model selection", lane.model_selection],
          ["Gov can choose models", lane.gov_can_choose_models],
          ["Visible answer mode", lane.visible_answer_mode],
        ])),
        section("Visible Analyst Rotation", table(["#", "Provider", "Model", "Position"], activeRows.length ? activeRows : [["-", "none", "none", "not loaded"]]), `${activeRows.length} loaded`),
        section("Governor", grid([
          ["Role", gov.role],
          ["Configured provider", gov.configured_provider],
          ["Loaded provider", gov.loaded_provider],
          ["Loaded model", gov.loaded_model],
          ["Status", gov.status],
          ["Visible answer producer", gov.visible_answer_producer],
        ])),
        section("Governed Shadow Lane", grid([
          ["Version", shadow.version],
          ["Enabled", shadow.enabled],
          ["Env var", shadow.env_var],
          ["Trigger policy", shadow.trigger_policy],
          ["Model selection", shadow.model_selection],
          ["Gov can choose models", shadow.gov_can_choose_models],
          ["Visible answer replaced", shadow.visible_answer_replaced],
        ])),
        section("Governed Shadow Call Order", table(["Slot", "Role", "Provider", "Model", "Function"], shadowRows.length ? shadowRows : [["-", "none", "none", "none", "not loaded"]]), `${shadowRows.length} calls`),
        section("Bench Pool", table(["#", "Provider", "Model"], benchRows.length ? benchRows : [["-", "none", "none"]]), `${benchRows.length} loaded`),
        section("State And Memory", grid([
          ["Context delivery", memory.context_delivery_mode],
          ["Memory delivery", memory.memory_delivery_mode],
          ["Structured state", memory.structured_state_object_mode],
          ["Baton pass", memory.baton_pass_mode],
          ["Rolling summary", memory.rolling_summary_mode],
          ["Continuity ledger", memory.continuity_ledger_mode],
          ["Analyst receives full memory", memory.analyst_receives_full_memory],
          ["Durable memory store", memory.durable_memory_store],
        ])),
        section("Safety Redactions", grid([
          ["Raw prompts exposed", safety.raw_prompts_exposed],
          ["Raw memory exposed", safety.raw_memory_exposed],
          ["Provider error bodies exposed", safety.provider_error_bodies_exposed],
          ["API keys exposed", safety.api_keys_exposed],
        ])),
        section("Raw Safe JSON", `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`)
      ].join("");
    }

    fetch("/runtime-status", {cache: "no-store"})
      .then(resp => resp.ok ? resp.json() : Promise.reject(new Error(`HTTP ${resp.status}`)))
      .then(render)
      .catch(err => {
        stamp.textContent = "unavailable";
        app.innerHTML = section("Runtime Status", grid([["Status", "unavailable"], ["Error", err.message]]));
      });
  </script>
</body>
</html>
