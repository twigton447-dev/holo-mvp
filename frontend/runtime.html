<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Holo Runtime</title>
  <style>
    :root {
      --bg: #0d0f12;
      --panel: #14181e;
      --line: #28303a;
      --text: #edf2f7;
      --muted: #9aa7b6;
      --ok: #79d69f;
      --warn: #f4c76b;
      --bad: #ff8b8b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1040px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      letter-spacing: 0;
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #1a2028;
      color: var(--text);
      min-height: 40px;
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }
    section.full { grid-column: 1 / -1; }
    h2 {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    dl {
      display: grid;
      grid-template-columns: minmax(130px, 0.42fr) minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0;
    }
    dt { color: var(--muted); font-size: 13px; }
    dd { margin: 0; font-size: 13px; overflow-wrap: anywhere; }
    .status { font-weight: 700; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      border-top: 1px solid var(--line);
      padding: 9px 8px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      dl { grid-template-columns: 1fr; }
      dd { margin-bottom: 6px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Holo Runtime</h1>
        <div class="sub">Safe process-state view. No raw prompts, memory, provider bodies, or keys.</div>
      </div>
      <button type="button" onclick="loadRuntime()">Refresh</button>
    </header>
    <div id="content" class="grid">
      <section class="full"><h2>Status</h2><div class="sub">Loading runtime status...</div></section>
    </div>
  </main>
  <script>
    const content = document.getElementById("content");
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
    }[ch]));
    const row = (key, value) => `<dt>${esc(key)}</dt><dd>${esc(value || "unknown")}</dd>`;
    const section = (title, rows, className = "") => `
      <section class="${className}">
        <h2>${esc(title)}</h2>
        <dl>${rows.join("")}</dl>
      </section>`;
    const statusClass = status => {
      if (status === true || status === "ok" || status === "ready" || status === "initialized") return "ok";
      if (status === false || status === "attention" || status === "not_initialized") return "bad";
      return "warn";
    };

    function rosterTable(rows) {
      const body = (rows || []).map(item => `
        <tr>
          <td>${esc(item.slot || "")}</td>
          <td>${esc(item.role || item.worker_role || "")}</td>
          <td class="mono">${esc(item.provider || "")}</td>
          <td class="mono">${esc(item.model || "")}</td>
        </tr>`).join("");
      return `
        <section class="full">
          <h2>Governed Shadow Sequence</h2>
          <table>
            <thead><tr><th>Slot</th><th>Role</th><th>Provider</th><th>Model</th></tr></thead>
            <tbody>${body}</tbody>
          </table>
        </section>`;
    }

    async function loadRuntime() {
      content.innerHTML = `<section class="full"><h2>Status</h2><div class="sub">Loading runtime status...</div></section>`;
      try {
        const response = await fetch("/runtime-status", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const release = data.release || {};
        const hc = data.holochat || {};
        const lane = hc.visible_chat_lane || {};
        const governor = hc.governor || {};
        const shadow = hc.governed_shadow_lane || {};
        const state = hc.state_and_memory || {};
        const safety = hc.safety || {};
        const cylinders = data.holochat_all_cylinders || {};
        const attention = (cylinders.attention_items || []).join(", ") || "none";
        content.innerHTML = [
          section("Release", [
            row("App version", release.app_version),
            row("Architecture", release.architecture_version),
            row("Build label", release.build_label),
            row("Commit", release.git_commit_short),
            row("Branch", release.git_branch),
            row("Deploy", [release.deploy_service, release.deploy_environment].filter(Boolean).join(" / ")),
          ]),
          section("All Cylinders", [
            row("Status", cylinders.status),
            row("All cylinders", cylinders.all_cylinders === true ? "yes" : "no"),
            row("Base runtime", cylinders.base_runtime_ready === true ? "ready" : "attention"),
            row("Hard-chat shadow", cylinders.hard_chat_shadow_ready === true ? "ready" : "off"),
            row("Attention", attention),
          ]),
          section("Visible Chat Lane", [
            row("Status", hc.status),
            row("Runtime profile", lane.runtime_profile),
            row("Runtime class", lane.runtime_class),
            row("Selection", lane.model_selection),
            row("Gov can choose models", lane.gov_can_choose_models === false ? "no" : "unknown"),
            row("Visible answer mode", lane.visible_answer_mode),
          ]),
          section("Governor", [
            row("Status", governor.status),
            row("Role", governor.role),
            row("Provider", governor.loaded_provider || governor.configured_provider),
            row("Model", governor.loaded_model),
            row("Visible answer producer", governor.visible_answer_producer === false ? "no" : "unknown"),
          ]),
          section("State And Memory", [
            row("Context delivery", state.context_delivery_mode),
            row("Memory delivery", state.memory_delivery_mode),
            row("State object", state.structured_state_object_mode),
            row("Baton pass", state.baton_pass_mode),
            row("Full memory to analyst", state.analyst_receives_full_memory === false ? "no" : "unknown"),
            row("Store", state.durable_memory_store),
          ]),
          section("Safety", [
            row("Raw prompts exposed", safety.raw_prompts_exposed === false ? "no" : "unknown"),
            row("Raw memory exposed", safety.raw_memory_exposed === false ? "no" : "unknown"),
            row("Provider errors exposed", safety.provider_error_bodies_exposed === false ? "no" : "unknown"),
            row("API keys exposed", safety.api_keys_exposed === false ? "no" : "unknown"),
          ]),
          rosterTable(shadow.expected_call_sequence || []),
        ].join("");
        const statusNode = [...document.querySelectorAll("dd")].find(node => node.textContent === cylinders.status);
        if (statusNode) statusNode.classList.add("status", statusClass(cylinders.status));
      } catch (error) {
        content.innerHTML = `<section class="full"><h2>Status</h2><div class="sub">Runtime status unavailable: ${esc(error.message)}</div></section>`;
      }
    }
    loadRuntime();
  </script>
</body>
</html>
